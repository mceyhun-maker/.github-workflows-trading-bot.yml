name: CE Trading Bot — Her 4 Saatte Çalış

on:
  schedule:
    # Her 4 saatte bir: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    # Türkiye saati UTC+3 — yani 03:00, 07:00, 11:00, 15:00, 19:00, 23:00
    - cron: '0 0,4,8,12,16,20 * * *'

  # Elle de çalıştırabilirsin (GitHub'da "Run workflow" butonu)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu çek
        uses: actions/checkout@v3

      - name: ⚙️ Node.js kur
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 📦 Bağımlılıkları yükle
        run: npm install

      - name: 🤖 Botu çalıştır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node trading-bot-pro.js

      - name: ✅ Tamamlandı
        run: echo "Bot başarıyla çalıştı — $(date)"
